<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Mission control map</title>
  <desc id="desc">Visual map of William Medina's main work areas: cybersecurity, AI, civic technology, education and IoT.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#031549" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="16" fill="#F8FAFC"/>
  <text x="64" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="950" fill="#031549">Mission Control</text>
  <text x="64" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="750" fill="#64748B">A portfolio built around systems, security, data and public value.</text>

  <g transform="translate(505 205)" filter="url(#shadow)">
    <circle cx="95" cy="70" r="82" fill="#031549"/>
    <circle cx="95" cy="70" r="56" fill="#00B5E2"/>
    <circle cx="95" cy="70" r="26" fill="#FFD500"/>
    <text x="95" y="186" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="950" fill="#031549">WILLIAMMDN</text>
  </g>

  <g fill="none" stroke="#00B5E2" stroke-width="4" stroke-linecap="round" stroke-dasharray="12 14">
    <path d="M600 275 L254 188"/>
    <path d="M600 275 L946 188"/>
    <path d="M600 275 L244 390"/>
    <path d="M600 275 L956 390"/>
    <path d="M600 275 L600 424"/>
    <animate attributeName="stroke-dashoffset" values="0;-52" dur="2.2s" repeatCount="indefinite"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(70 142)">
      <rect width="300" height="98" rx="10" fill="#FFFFFF" stroke="#DCE7F2"/>
      <rect x="18" y="18" width="62" height="62" rx="10" fill="#031549"/>
      <text x="49" y="56" text-anchor="middle" font-size="26" font-weight="950" fill="#00B5E2">01</text>
      <text x="98" y="42" font-size="19" font-weight="950" fill="#031549">Cybersecurity</text>
      <text x="98" y="66" font-size="13" font-weight="750" fill="#64748B">Defense, labs, Linux, auditing</text>
    </g>
    <g transform="translate(830 142)">
      <rect width="300" height="98" rx="10" fill="#FFFFFF" stroke="#DCE7F2"/>
      <rect x="18" y="18" width="62" height="62" rx="10" fill="#031549"/>
      <text x="49" y="56" text-anchor="middle" font-size="26" font-weight="950" fill="#FFD500">02</text>
      <text x="98" y="42" font-size="19" font-weight="950" fill="#031549">Applied AI</text>
      <text x="98" y="66" font-size="13" font-weight="750" fill="#64748B">Paltodoc, CNNs, datasets</text>
    </g>
    <g transform="translate(70 344)">
      <rect width="300" height="98" rx="10" fill="#FFFFFF" stroke="#DCE7F2"/>
      <rect x="18" y="18" width="62" height="62" rx="10" fill="#031549"/>
      <text x="49" y="56" text-anchor="middle" font-size="26" font-weight="950" fill="#00B5E2">03</text>
      <text x="98" y="42" font-size="19" font-weight="950" fill="#031549">Civic Tech</text>
      <text x="98" y="66" font-size="13" font-weight="750" fill="#64748B">VialCentiva, mobility, trust</text>
    </g>
    <g transform="translate(830 344)">
      <rect width="300" height="98" rx="10" fill="#FFFFFF" stroke="#DCE7F2"/>
      <rect x="18" y="18" width="62" height="62" rx="10" fill="#031549"/>
      <text x="49" y="56" text-anchor="middle" font-size="26" font-weight="950" fill="#FFD500">04</text>
      <text x="98" y="42" font-size="19" font-weight="950" fill="#031549">Education</text>
      <text x="98" y="66" font-size="13" font-weight="750" fill="#64748B">Academia Daemon, AI literacy</text>
    </g>
    <g transform="translate(450 410)">
      <rect width="300" height="74" rx="10" fill="#031549"/>
      <text x="150" y="32" text-anchor="middle" font-size="19" font-weight="950" fill="#FFFFFF">IoT and Field Prototypes</text>
      <text x="150" y="54" text-anchor="middle" font-size="13" font-weight="750" fill="#BDEFFF">ESP32, Arduino, monitoring concepts</text>
    </g>
