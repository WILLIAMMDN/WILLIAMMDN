<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="640" viewBox="0 0 1400 640" role="img" aria-labelledby="title desc">
  <title id="title">Mission Control Map</title>
  <desc id="desc">Animated mission map of security, AI, mobility, education and hardware systems.</desc>
  <defs>
    <radialGradient id="radar" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#00D9FF" stop-opacity="0.36"/>
      <stop offset="0.52" stop-color="#00D9FF" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#07111F" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#07111F" flood-opacity="0.22"/>
    </filter>
    <pattern id="dots" width="34" height="34" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#00D9FF" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="1400" height="640" rx="20" fill="#F8FBFF"/>
  <rect width="1400" height="640" rx="20" fill="url(#dots)"/>
  <text x="72" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="950" fill="#07111F">Mission Control</text>
  <text x="72" y="112" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="760" fill="#4B6478">A living map of systems, research directions and operating principles.</text>

  <g transform="translate(700 332)">
    <circle cx="0" cy="0" r="188" fill="url(#radar)"/>
    <circle cx="0" cy="0" r="190" fill="none" stroke="#D7E8F2" stroke-width="2"/>
    <circle cx="0" cy="0" r="136" fill="none" stroke="#D7E8F2" stroke-width="2"/>
    <circle cx="0" cy="0" r="84" fill="none" stroke="#D7E8F2" stroke-width="2"/>
    <line x1="-210" y1="0" x2="210" y2="0" stroke="#D7E8F2" stroke-width="2"/>
    <line x1="0" y1="-210" x2="0" y2="210" stroke="#D7E8F2" stroke-width="2"/>
    <path d="M0 0 L168 -64" stroke="#00D9FF" stroke-width="6" stroke-linecap="round" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="56" fill="#07111F"/>
    <circle cx="0" cy="0" r="34" fill="#00D9FF"/>
    <text x="0" y="7" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="950" fill="#07111F">WM</text>
  </g>

  <g fill="none" stroke="#00D9FF" stroke-width="4" stroke-dasharray="12 14" stroke-linecap="round">
    <path d="M700 332 L280 205">
      <animate attributeName="stroke-dashoffset" values="0;-52" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M700 332 L1120 205">
      <animate attributeName="stroke-dashoffset" values="0;-52" dur="2.3s" repeatCount="indefinite"/>
    </path>
    <path d="M700 332 L280 485">
      <animate attributeName="stroke-dashoffset" values="0;-52" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M700 332 L1120 485">
      <animate attributeName="stroke-dashoffset" values="0;-52" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M700 332 L700 548">
      <animate attributeName="stroke-dashoffset" values="0;-52" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(78 154)">
      <rect width="360" height="112" rx="14" fill="#07111F"/>
      <rect x="18" y="18" width="74" height="74" rx="14" fill="#00D9FF" opacity="0.2"/>
      <text x="55" y="64" text-anchor="middle" font-size="27" font-weight="950" fill="#00D9FF">01</text>
      <text x="112" y="46" font-size="21" font-weight="950" fill="#FFFFFF">Security</text>
      <text x="112" y="75" font-size="14" font-weight="760" fill="#BDEFFF">Labs, auditing, hardening, privacy</text>
    </g>
    <g transform="translate(962 154)">
      <rect width="360" height="112" rx="14" fill="#FFFFFF" stroke="#DCEAF2"/>
      <rect x="18" y="18" width="74" height="74" rx="14" fill="#FFD166" opacity="0.35"/>
      <text x="55" y="64" text-anchor="middle" font-size="27" font-weight="950" fill="#07111F">02</text>
      <text x="112" y="46" font-size="21" font-weight="950" fill="#07111F">Applied AI</text>
      <text x="112" y="75" font-size="14" font-weight="760" fill="#4B6478">Vision models, datasets, Paltodoc</text>
    </g>
    <g transform="translate(78 430)">
      <rect width="360" height="112" rx="14" fill="#FFFFFF" stroke="#DCEAF2"/>
      <rect x="18" y="18" width="74" height="74" rx="14" fill="#00D9FF" opacity="0.22"/>
      <text x="55" y="64" text-anchor="middle" font-size="27" font-weight="950" fill="#07111F">03</text>
      <text x="112" y="46" font-size="21" font-weight="950" fill="#07111F">Civic Tech</text>
      <text x="112" y="75" font-size="14" font-weight="760" fill="#4B6478">VialCentiva, reputation, QR data</text>
    </g>
    <g transform="translate(962 430)">
      <rect width="360" height="112" rx="14" fill="#07111F"/>
      <rect x="18" y="18" width="74" height="74" rx="14" fill="#FFD166" opacity="0.25"/>
      <text x="55" y="64" text-anchor="middle" font-size="27" font-weight="950" fill="#FFD166">04</text>
      <text x="112" y="46" font-size="21" font-weight="950" fill="#FFFFFF">Education</text>
      <text x="112" y="75" font-size="14" font-weight="760" fill="#BDEFFF">Academia Daemon, AI literacy</text>
    </g>
    <g transform="translate(520 548)">
      <rect width="360" height="58" rx="14" fill="#07111F"/>
      <text x="180" y="25" text-anchor="middle" font-size="18" font-weight="950" fill="#FFFFFF">Hardware + Field Prototypes</text>
      <text x="180" y="45" text-anchor="middle" font-size="12" font-weight="760" fill="#BDEFFF">ESP32 · Arduino · sensors · monitoring concepts</text>
    </g>
  </g>
</svg>
