<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="96" viewBox="0 0 1200 96" role="img" aria-labelledby="title">
  <title id="title">Animated signal divider</title>
  <defs>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset="0.5" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="96" rx="18" fill="#07111F"/>
  <path d="M40 48 H1160" stroke="#13243A" stroke-width="16" stroke-linecap="round"/>
  <path d="M40 48 H1160" stroke="url(#line)" stroke-width="7" stroke-linecap="round" stroke-dasharray="42 32">
    <animate attributeName="stroke-dashoffset" values="0;-148" dur="2.3s" repeatCount="indefinite"/>
  </path>
  <path d="M92 48 C148 8 196 88 252 48 S360 8 416 48 S524 88 580 48 S688 8 744 48 S852 88 908 48 S1016 8 1072 48" fill="none" stroke="#E6F7FF" stroke-width="2.5" opacity="0.82">
    <animate attributeName="opacity" values="0.18;0.9;0.18" dur="2.8s" repeatCount="indefinite"/>
  </path>
  <g fill="#FFD166">
    <circle cx="40" cy="48" r="7"/>
    <circle cx="600" cy="48" r="9">
      <animate attributeName="r" values="7;18;7" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1160" cy="48" r="7"/>
  </g>
  <text x="600" y="82" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="13" font-weight="900" fill="#8EDFF2" letter-spacing="4">SECURE SIGNAL ACTIVE</text>
</svg>
