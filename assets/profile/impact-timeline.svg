<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500" role="img" aria-labelledby="title desc">
  <title id="title">Execution Timeline</title>
  <desc id="desc">Animated timeline from observation to secure product iteration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E8F8FE"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset="0.55" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#07111F" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect width="1400" height="500" rx="22" fill="url(#bg)"/>
  <text x="70" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="950" fill="#07111F">Execution Timeline</text>
  <text x="70" y="114" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="760" fill="#4B6478">How ideas move from local observation to useful, secured and measurable systems.</text>

  <path d="M120 278 H1280" stroke="#D5E7F0" stroke-width="16" stroke-linecap="round"/>
  <path d="M120 278 H1280" stroke="url(#signal)" stroke-width="7" stroke-linecap="round" stroke-dasharray="42 28">
    <animate attributeName="stroke-dashoffset" values="0;-140" dur="2.4s" repeatCount="indefinite"/>
  </path>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(80 192)">
      <rect width="190" height="150" rx="16" fill="#07111F"/>
      <circle cx="95" cy="86" r="28" fill="#00D9FF"/>
      <text x="95" y="93" text-anchor="middle" font-size="18" font-weight="950" fill="#07111F">01</text>
      <text x="95" y="38" text-anchor="middle" font-size="17" font-weight="950" fill="#FFFFFF">Observe</text>
      <text x="95" y="128" text-anchor="middle" font-size="12" font-weight="760" fill="#BDEFFF">real constraints</text>
    </g>
    <g transform="translate(320 192)">
      <rect width="190" height="150" rx="16" fill="#FFFFFF" stroke="#DCEAF2"/>
      <circle cx="95" cy="86" r="28" fill="#FFD166"/>
      <text x="95" y="93" text-anchor="middle" font-size="18" font-weight="950" fill="#07111F">02</text>
      <text x="95" y="38" text-anchor="middle" font-size="17" font-weight="950" fill="#07111F">Model</text>
      <text x="95" y="128" text-anchor="middle" font-size="12" font-weight="760" fill="#4B6478">users, data, flow</text>
    </g>
    <g transform="translate(560 192)">
      <rect width="190" height="150" rx="16" fill="#07111F"/>
      <circle cx="95" cy="86" r="28" fill="#00D9FF"/>
      <text x="95" y="93" text-anchor="middle" font-size="18" font-weight="950" fill="#07111F">03</text>
      <text x="95" y="38" text-anchor="middle" font-size="17" font-weight="950" fill="#FFFFFF">Prototype</text>
      <text x="95" y="128" text-anchor="middle" font-size="12" font-weight="760" fill="#BDEFFF">make it usable</text>
    </g>
    <g transform="translate(800 192)">
      <rect width="190" height="150" rx="16" fill="#FFFFFF" stroke="#DCEAF2"/>
      <circle cx="95" cy="86" r="28" fill="#FFD166"/>
      <text x="95" y="93" text-anchor="middle" font-size="18" font-weight="950" fill="#07111F">04</text>
      <text x="95" y="38" text-anchor="middle" font-size="17" font-weight="950" fill="#07111F">Secure</text>
      <text x="95" y="128" text-anchor="middle" font-size="12" font-weight="760" fill="#4B6478">protect the signal</text>
    </g>
    <g transform="translate(1040 192)">
      <rect width="190" height="150" rx="16" fill="#07111F"/>
      <circle cx="95" cy="86" r="28" fill="#00D9FF"/>
      <text x="95" y="93" text-anchor="middle" font-size="18" font-weight="950" fill="#07111F">05</text>
      <text x="95" y="38" text-anchor="middle" font-size="17" font-weight="950" fill="#FFFFFF">Measure</text>
      <text x="95" y="128" text-anchor="middle" font-size="12" font-weight="760" fill="#BDEFFF">iterate with evidence</text>
    </g>
  </g>

  <text x="700" y="424" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="14" font-weight="900" fill="#07111F" letter-spacing="3">OBSERVATION -> SYSTEM -> TRUST -> IMPACT -> NEXT VERSION</text>
</svg>
