<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="120" viewBox="0 0 1400 120" role="img" aria-labelledby="title">
  <title id="title">Minimal footer line</title>
  <rect width="1400" height="120" rx="16" fill="#111827"/>
  <path d="M80 62 H1320" stroke="#374151" stroke-width="2"/>
  <path d="M80 62 H1320" stroke="#10B981" stroke-width="2" stroke-dasharray="34 24" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" values="0;-116" dur="4s" repeatCount="indefinite"/>
  </path>
  <circle cx="700" cy="62" r="5" fill="#F9FAFB"/>
  <text x="700" y="34" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" font-weight="800" fill="#FFFFFF">Building from Apurimac with discipline, clarity and public value.</text>
  <text x="700" y="92" text-anchor="middle" font-family="JetBrains Mono, Consolas, monospace" font-size="11" font-weight="700" fill="#9CA3AF" letter-spacing="3">END OF DOSSIER / BUILD CONTINUES</text>
