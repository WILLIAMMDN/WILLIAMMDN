<svg xmlns="http://www.w3.org/2000/svg" width="650" height="430" viewBox="0 0 650 430">
  <defs>
    <style>
      .bg { fill: #111111; }
      .text { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #e0e0e0; }
      .logo { font-family: 'Courier New', Courier, monospace; font-size: 14px; fill: #5ab0b2; font-weight: bold; }
      .user { fill: #5ab0b2; font-weight: bold; }
      .host { fill: #e0e0e0; font-weight: bold; }
      .key { fill: #5ab0b2; font-weight: bold; }
      .cursor { fill: #e0e0e0; animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .content { opacity: 0; animation: fadeIn 0.1s forwards; animation-delay: 1.5s; }
      @keyframes fadeIn { to { opacity: 1; } }
    </style>
  </defs>

  <rect width="650" height="430" rx="8" class="bg" stroke="#30363d" stroke-width="2"/>
  
  <circle cx="20" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="40" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="60" cy="20" r="6" fill="#27c93f"/>
  <text x="325" y="24" fill="#888888" font-family="sans-serif" font-size="12" text-anchor="middle">william@cyber-labs: ~</text>

  <text x="20" y="55" class="text" xml:space="preserve"><tspan fill="#27c93f">william@cyber-labs</tspan><tspan fill="#e0e0e0">:</tspan><tspan fill="#5ab0b2">~</tspan><tspan fill="#e0e0e0">$ neofetch</tspan></text>

  <g class="content">
    <!-- Left Column: Radiohead Logo (x=20) -->
    <text x="20" y="85" class="logo" xml:space="preserve">        .,-""""""-,.      </text>
    <text x="20" y="105" class="logo" xml:space="preserve">      ,'            '.    </text>
    <text x="20" y="125" class="logo" xml:space="preserve">     /    _      _    \   </text>
    <text x="20" y="145" class="logo" xml:space="preserve">    :    / \    / \    :  </text>
    <text x="20" y="165" class="logo" xml:space="preserve">    |    \_/    \_/    |  </text>
    <text x="20" y="185" class="logo" xml:space="preserve">    |                  |  </text>
    <text x="20" y="205" class="logo" xml:space="preserve">    :    .--------.    :  </text>
    <text x="20" y="225" class="logo" xml:space="preserve">     \   |////////|   /   </text>
    <text x="20" y="245" class="logo" xml:space="preserve">      '. '--------' .'    </text>
    <text x="20" y="265" class="logo" xml:space="preserve">        '-,_    _,-'      </text>
    <text x="20" y="285" class="logo" xml:space="preserve">            """"          </text>

    <!-- Right Column: System Info (x=300) -->
    <text x="300" y="85" class="text" xml:space="preserve"><tspan class="user">william</tspan><tspan>@</tspan><tspan class="host">cyber-labs</tspan></text>
    <text x="300" y="105" class="text" xml:space="preserve">------------------</text>
    <text x="300" y="125" class="text" xml:space="preserve"><tspan class="key">OS</tspan>: Arch Linux x86_64</text>
    <text x="300" y="145" class="text" xml:space="preserve"><tspan class="key">Host</tspan>: System Product Name</text>
    <text x="300" y="165" class="text" xml:space="preserve"><tspan class="key">Kernel</tspan>: 6.8.9-arch1-1</text>
    <text x="300" y="185" class="text" xml:space="preserve"><tspan class="key">Uptime</tspan>: 4 hours, 20 mins</text>
    <text x="300" y="205" class="text" xml:space="preserve"><tspan class="key">Packages</tspan>: 1337 (pacman)</text>
    <text x="300" y="225" class="text" xml:space="preserve"><tspan class="key">Shell</tspan>: bash 5.2.26</text>
    <text x="300" y="245" class="text" xml:space="preserve"><tspan class="key">Terminal</tspan>: alacritty</text>
    <text x="300" y="265" class="text" xml:space="preserve"><tspan class="key">CPU</tspan>: Intel i7-1165G7 (8) @ 4.70GHz</text>
    <text x="300" y="285" class="text" xml:space="preserve"><tspan class="key">Memory</tspan>: 4321MiB / 15774MiB</text>

    <!-- Right Column: Palette Blocks -->
    <rect x="300" y="305" width="16" height="16" fill="#111111"/>
    <rect x="316" y="305" width="16" height="16" fill="#ff5f56"/>
    <rect x="332" y="305" width="16" height="16" fill="#27c93f"/>
    <rect x="348" y="305" width="16" height="16" fill="#ffbd2e"/>
    <rect x="364" y="305" width="16" height="16" fill="#1793d1"/>
    <rect x="380" y="305" width="16" height="16" fill="#b48ead"/>
    <rect x="396" y="305" width="16" height="16" fill="#89dceb"/>
    <rect x="412" y="305" width="16" height="16" fill="#e0e0e0"/>

    <!-- Prompt at the bottom -->
    <text x="20" y="405" class="text" xml:space="preserve"><tspan fill="#27c93f">william@cyber-labs</tspan><tspan fill="#e0e0e0">:</tspan><tspan fill="#5ab0b2">~</tspan><tspan fill="#e0e0e0">$ </tspan></text>
    <rect x="180" y="393" width="8" height="15" class="cursor"/>
  </g>
</svg>
