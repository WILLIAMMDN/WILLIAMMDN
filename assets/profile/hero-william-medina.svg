<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">William Medina Command Center</title>
  <desc id="desc">Animated professional command-center hero for GitHub profile.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1F2A44" stroke-width="1"/>
      <circle cx="0" cy="0" r="1" fill="#22D3EE" opacity="0.28"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <linearGradient id="cyanLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="620" rx="22" fill="#0B1020"/>
  <rect width="1400" height="620" rx="22" fill="url(#grid)" opacity="0.74"/>
  <path d="M0 520 C210 442 370 578 612 494 C900 394 1110 468 1400 352 V620 H0 Z" fill="#111827" opacity="0.86"/>
  <path d="M0 552 C260 500 438 594 696 538 C980 476 1180 506 1400 430 V620 H0 Z" fill="#22D3EE" opacity="0.08"/>

  <g transform="translate(74 82)">
    <text x="0" y="0" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" fill="#FACC15" letter-spacing="5">WILLIAMMDN // COMMAND CENTER</text>
    <text x="0" y="86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="70" font-weight="950" fill="#F8FAFC">Max William</text>
    <text x="0" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="70" font-weight="950" fill="#F8FAFC">Medina Castro</text>
    <rect x="0" y="194" width="678" height="56" rx="10" fill="#F8FAFC"/>
    <text x="24" y="231" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="900" fill="#0B1020">Systems Engineering | Cybersecurity | Applied AI</text>
    <text x="0" y="304" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#CFEFFF">Building useful systems for mobility, agriculture, education and secure operations.</text>
  </g>

  <g transform="translate(830 88)" filter="url(#shadow)">
    <rect width="438" height="344" rx="18" fill="#0F172A" stroke="#22D3EE" stroke-opacity="0.55"/>
    <rect width="438" height="48" rx="18" fill="#111827"/>
    <circle cx="28" cy="24" r="6" fill="#EF4444"/>
    <circle cx="50" cy="24" r="6" fill="#FACC15"/>
    <circle cx="72" cy="24" r="6" fill="#22C55E"/>
    <text x="100" y="30" font-family="JetBrains Mono, Consolas, monospace" font-size="14" font-weight="800" fill="#94A3B8">systems.yaml</text>
    <text x="28" y="94" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="800" fill="#22D3EE">status:</text>
    <text x="54" y="128" font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">VialCentiva.active()</text>
    <text x="54" y="160" font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">Paltodoc.training()</text>
    <text x="54" y="192" font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">Daemon.educate()</text>
    <text x="54" y="224" font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">CyberLabs.audit()</text>
    <rect x="28" y="270" width="330" height="16" rx="8" fill="#1E293B"/>
    <rect x="28" y="270" width="120" height="16" rx="8" fill="url(#cyanLine)">
      <animate attributeName="width" values="90;340;220;380;90" dur="5s" repeatCount="indefinite"/>
    </rect>
    <text x="28" y="312" font-family="JetBrains Mono, Consolas, monospace" font-size="13" font-weight="800" fill="#FACC15">certs: Cisco + Google AI + labs</text>
  </g>

  <g fill="none" stroke="url(#cyanLine)" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 18">
    <path d="M742 386 C792 328 806 260 830 214">
      <animate attributeName="stroke-dashoffset" values="0;-40" dur="2.4s" repeatCount="indefinite"/>
    </path>
    <path d="M742 386 C650 364 580 334 508 292">
      <animate attributeName="stroke-dashoffset" values="0;-40" dur="2.8s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(86 500)" font-family="JetBrains Mono, Consolas, monospace" font-size="13" font-weight="800" fill="#94A3B8">
    <text x="0" y="0">LOCAL PROBLEMS / SERIOUS ENGINEERING / SECURITY THINKING / PUBLIC VALUE</text>
  </g>
</svg>
