<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Max William Medina Castro - GitHub Profile</title>
  <desc id="desc">Professional cyber engineering profile hero with terminal panels, signal paths and project orbit.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#031549"/>
      <stop offset="0.58" stop-color="#06245f"/>
      <stop offset="1" stop-color="#00B5E2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="520" rx="18" fill="url(#bg)"/>
  <rect width="1200" height="520" rx="18" fill="url(#grid)"/>
  <path d="M0 408 C230 350 404 446 620 390 C842 332 1010 338 1200 282 V520 H0 Z" fill="#F8FAFC" opacity="0.08"/>
  <path d="M0 454 C250 400 448 494 680 430 C900 370 1066 400 1200 360 V520 H0 Z" fill="#FFD500" opacity="0.22"/>

  <g transform="translate(70 74)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="900" fill="#FFD500" letter-spacing="3">WILLIAMMDN</text>
    <text x="0" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="950" fill="#FFFFFF">Max William</text>
    <text x="0" y="132" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="950" fill="#FFFFFF">Medina Castro</text>
    <rect x="0" y="158" width="528" height="54" rx="8" fill="#FFD500"/>
    <text x="22" y="193" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="950" fill="#031549">Systems Engineering · Cybersecurity · AI</text>
    <text x="0" y="252" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#DFF8FF">Building secure, useful and locally grounded technology.</text>
  </g>

  <g transform="translate(750 74)" filter="url(#shadow)">
    <rect width="360" height="312" rx="16" fill="#071B49" stroke="#00B5E2" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="360" height="46" rx="16" fill="#0B255F"/>
    <circle cx="26" cy="23" r="6" fill="#FF5F57"/>
    <circle cx="48" cy="23" r="6" fill="#FFD500"/>
    <circle cx="70" cy="23" r="6" fill="#20C997"/>
    <text x="26" y="88" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700" fill="#00B5E2">$ whoami</text>
    <text x="26" y="122" font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">systems_engineer.in_progress</text>
    <text x="26" y="164" font-family="JetBrains Mono, Consolas, monospace" font-size="18" font-weight="700" fill="#00B5E2">$ mission --focus</text>
    <text x="26" y="198" font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">secure_apps + applied_ai</text>
    <text x="26" y="232" font-family="JetBrains Mono, Consolas, monospace" font-size="17" font-weight="700" fill="#FFFFFF">mobility + education + iot</text>
    <rect x="26" y="258" width="210" height="16" rx="8" fill="#00B5E2">
      <animate attributeName="width" values="90;250;210;300;210" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(650 392)">
    <circle cx="0" cy="0" r="15" fill="#FFD500"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#FFD500" stroke-width="3" opacity="0.55">
      <animate attributeName="r" values="22;48;22" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0;0.6" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g fill="none" stroke="#FFFFFF" stroke-width="7" stroke-linecap="round" stroke-dasharray="2 22" opacity="0.75">
    <path d="M612 392 C660 330 700 298 748 244">
      <animate attributeName="stroke-dashoffset" from="0" to="-48" dur="2.2s" repeatCount="indefinite"/>
    </path>
    <path d="M612 392 C492 356 430 314 342 258">
      <animate attributeName="stroke-dashoffset" from="0" to="-48" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <g transform="translate(72 438)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="900">
    <rect x="0" y="0" width="134" height="34" rx="8" fill="#FFFFFF" opacity="0.12"/>
    <text x="67" y="23" text-anchor="middle" fill="#FFFFFF">VialCentiva</text>
    <rect x="150" y="0" width="120" height="34" rx="8" fill="#FFFFFF" opacity="0.12"/>
    <text x="210" y="23" text-anchor="middle" fill="#FFFFFF">Paltodoc</text>
    <rect x="286" y="0" width="166" height="34" rx="8" fill="#FFFFFF" opacity="0.12"/>
    <text x="369" y="23" text-anchor="middle" fill="#FFFFFF">Academia Daemon</text>
    <rect x="468" y="0" width="116" height="34" rx="8" fill="#FFFFFF" opacity="0.12"/>
    <text x="526" y="23" text-anchor="middle" fill="#FFFFFF">Cyber Labs</text>
  </g>
</svg>
