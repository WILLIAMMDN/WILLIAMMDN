<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="600" viewBox="0 0 1400 600" role="img" aria-labelledby="title desc">
  <title id="title">Architecture Board</title>
  <desc id="desc">Minimal architecture board showing the working method from field input to secure systems.</desc>
  <rect width="1400" height="600" rx="16" fill="#F9FAFB"/>
  <rect x="1" y="1" width="1398" height="598" rx="16" fill="none" stroke="#D1D5DB"/>
  <text x="64" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" fill="#111827">Architecture Board</text>
  <text x="64" y="114" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#6B7280">A restrained map of how I move from context to product.</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="none">
    <g transform="translate(82 198)">
      <rect width="230" height="130" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
      <text x="26" y="42" font-size="18" font-weight="900" fill="#111827">01 Context</text>
      <text x="26" y="74" font-size="14" font-weight="600" fill="#4B5563">People, constraints,</text>
      <text x="26" y="96" font-size="14" font-weight="600" fill="#4B5563">risks and incentives.</text>
    </g>
    <g transform="translate(390 198)">
      <rect width="230" height="130" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
      <text x="26" y="42" font-size="18" font-weight="900" fill="#111827">02 Interface</text>
      <text x="26" y="74" font-size="14" font-weight="600" fill="#4B5563">Usable screens and</text>
      <text x="26" y="96" font-size="14" font-weight="600" fill="#4B5563">clear interaction flow.</text>
    </g>
    <g transform="translate(698 198)">
      <rect width="230" height="130" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
      <text x="26" y="42" font-size="18" font-weight="900" fill="#111827">03 Data</text>
      <text x="26" y="74" font-size="14" font-weight="600" fill="#4B5563">Schemas, validation,</text>
      <text x="26" y="96" font-size="14" font-weight="600" fill="#4B5563">ownership and history.</text>
    </g>
    <g transform="translate(1006 198)">
      <rect width="230" height="130" rx="10" fill="#111827"/>
      <text x="26" y="42" font-size="18" font-weight="900" fill="#FFFFFF">04 Security</text>
      <text x="26" y="74" font-size="14" font-weight="600" fill="#D1D5DB">Permissions, privacy,</text>
      <text x="26" y="96" font-size="14" font-weight="600" fill="#D1D5DB">auditability and trust.</text>
    </g>
  </g>
  <g fill="none" stroke="#0F766E" stroke-width="3" stroke-linecap="round" stroke-dasharray="18 14">
    <path d="M322 263 H380">
      <animate attributeName="stroke-dashoffset" values="0;-64" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M630 263 H688">
      <animate attributeName="stroke-dashoffset" values="0;-64" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M938 263 H996">
      <animate attributeName="stroke-dashoffset" values="0;-64" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(180 422)" font-family="JetBrains Mono, Consolas, monospace" font-size="14" font-weight="700" fill="#374151">
    <rect x="0" y="0" width="1040" height="76" rx="10" fill="#FFFFFF" stroke="#D1D5DB"/>
    <text x="32" y="32">method: observe -> prototype -> secure -> measure -> document -> improve</text>
    <text x="32" y="56" fill="#0F766E">output: systems that are legible, usable and responsible with data</text>
  </g>
</svg>
