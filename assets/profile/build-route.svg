<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Build Route Timeline</title>
  <desc id="desc">Minimal build route timeline with project milestones.</desc>
  <rect width="1400" height="420" rx="16" fill="#FFFFFF"/>
  <rect x="1" y="1" width="1398" height="418" rx="16" fill="none" stroke="#D1D5DB"/>
  <text x="64" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="900" fill="#111827">Build Route</text>
  <text x="64" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="600" fill="#6B7280">A small map of how projects move from concept to public signal.</text>
  <path d="M120 236 H1280" stroke="#E5E7EB" stroke-width="8" stroke-linecap="round"/>
  <path d="M120 236 H1280" stroke="#0F766E" stroke-width="4" stroke-linecap="round" stroke-dasharray="28 22">
    <animate attributeName="stroke-dashoffset" values="0;-100" dur="4s" repeatCount="indefinite"/>
  </path>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(90 178)">
      <circle cx="30" cy="58" r="24" fill="#111827"/>
      <text x="30" y="64" text-anchor="middle" font-size="14" font-weight="900" fill="#FFFFFF">1</text>
      <text x="0" y="116" font-size="16" font-weight="900" fill="#111827">Observe</text>
      <text x="0" y="140" font-size="13" font-weight="600" fill="#6B7280">field problem</text>
    </g>
    <g transform="translate(374 178)">
      <circle cx="30" cy="58" r="24" fill="#0F766E"/>
      <text x="30" y="64" text-anchor="middle" font-size="14" font-weight="900" fill="#FFFFFF">2</text>
      <text x="-8" y="116" font-size="16" font-weight="900" fill="#111827">Prototype</text>
      <text x="-8" y="140" font-size="13" font-weight="600" fill="#6B7280">visible system</text>
    </g>
    <g transform="translate(674 178)">
      <circle cx="30" cy="58" r="24" fill="#111827"/>
      <text x="30" y="64" text-anchor="middle" font-size="14" font-weight="900" fill="#FFFFFF">3</text>
      <text x="-4" y="116" font-size="16" font-weight="900" fill="#111827">Secure</text>
      <text x="-4" y="140" font-size="13" font-weight="600" fill="#6B7280">data and access</text>
    </g>
    <g transform="translate(966 178)">
      <circle cx="30" cy="58" r="24" fill="#0F766E"/>
      <text x="30" y="64" text-anchor="middle" font-size="14" font-weight="900" fill="#FFFFFF">4</text>
      <text x="-8" y="116" font-size="16" font-weight="900" fill="#111827">Measure</text>
      <text x="-8" y="140" font-size="13" font-weight="600" fill="#6B7280">impact signal</text>
    </g>
    <g transform="translate(1244 178)">
      <circle cx="30" cy="58" r="24" fill="#111827"/>
      <text x="30" y="64" text-anchor="middle" font-size="14" font-weight="900" fill="#FFFFFF">5</text>
      <text x="-10" y="116" font-size="16" font-weight="900" fill="#111827">Document</text>
      <text x="-10" y="140" font-size="13" font-weight="600" fill="#6B7280">decisions</text>
    </g>
  </g>
</svg>
