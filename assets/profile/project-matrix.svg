<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="620" viewBox="0 0 1400 620" role="img" aria-labelledby="title desc">
  <title id="title">Project Matrix</title>
  <desc id="desc">Premium project cards for VialCentiva, Paltodoc, Academia Daemon and Cyber Labs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#0B1F35"/>
      <stop offset="1" stop-color="#12294A"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00D9FF"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFD166"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1400" height="620" rx="24" fill="url(#bg)"/>
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.08">
    <path d="M0 130 H1400"/>
    <path d="M0 310 H1400"/>
    <path d="M0 490 H1400"/>
    <path d="M240 0 V620"/>
    <path d="M700 0 V620"/>
    <path d="M1160 0 V620"/>
  </g>
  <text x="70" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="950" fill="#FFFFFF">Active Systems Matrix</text>
  <text x="70" y="114" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="760" fill="#BDEFFF">Projects framed as operating systems: problem, signal, stack and impact.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(70 166)">
      <rect width="600" height="176" rx="18" fill="#0A1728" stroke="#00D9FF" stroke-opacity="0.42"/>
      <circle cx="62" cy="62" r="36" fill="url(#cyan)"/>
      <text x="62" y="72" text-anchor="middle" font-size="24" font-weight="950" fill="#07111F">VC</text>
      <text x="122" y="48" font-size="26" font-weight="950" fill="#FFFFFF">VialCentiva</text>
      <text x="122" y="78" font-size="15" font-weight="800" fill="#00D9FF">QR mobility reputation platform</text>
      <text x="122" y="114" font-size="15" font-weight="700" fill="#DFFAFF">Passenger audits, driver trust, privacy, anti-fraud device identity and public transport telemetry.</text>
      <rect x="122" y="138" width="116" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="180" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">React</text>
      <rect x="250" y="138" width="126" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="313" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Supabase</text>
      <rect x="388" y="138" width="88" height="24" rx="7" fill="#FFD166" opacity="0.22"/>
      <text x="432" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">QR</text>
    </g>

    <g transform="translate(730 166)">
      <rect width="600" height="176" rx="18" fill="#0A1728" stroke="#FFD166" stroke-opacity="0.42"/>
      <circle cx="62" cy="62" r="36" fill="url(#gold)"/>
      <text x="62" y="72" text-anchor="middle" font-size="24" font-weight="950" fill="#07111F">PD</text>
      <text x="122" y="48" font-size="26" font-weight="950" fill="#FFFFFF">Paltodoc</text>
      <text x="122" y="78" font-size="15" font-weight="800" fill="#FFD166">AI-assisted foliar diagnosis</text>
      <text x="122" y="114" font-size="15" font-weight="700" fill="#DFFAFF">Computer vision workflows for detecting crop anomalies with specialized image datasets.</text>
      <rect x="122" y="138" width="112" height="24" rx="7" fill="#FFD166" opacity="0.22"/>
      <text x="178" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Python</text>
      <rect x="246" y="138" width="82" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="287" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">CNN</text>
      <rect x="340" y="138" width="116" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="398" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Datasets</text>
    </g>

    <g transform="translate(70 382)">
      <rect width="600" height="176" rx="18" fill="#0A1728" stroke="#FFD166" stroke-opacity="0.42"/>
      <circle cx="62" cy="62" r="36" fill="url(#gold)"/>
      <text x="62" y="72" text-anchor="middle" font-size="24" font-weight="950" fill="#07111F">AD</text>
      <text x="122" y="48" font-size="26" font-weight="950" fill="#FFFFFF">Academia Daemon</text>
      <text x="122" y="78" font-size="15" font-weight="800" fill="#FFD166">AI and digital literacy initiative</text>
      <text x="122" y="114" font-size="15" font-weight="700" fill="#DFFAFF">Learning paths for young builders: coding foundations, AI concepts and creative confidence.</text>
      <rect x="122" y="138" width="118" height="24" rx="7" fill="#FFD166" opacity="0.22"/>
      <text x="181" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Education</text>
      <rect x="252" y="138" width="88" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="296" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">AI</text>
      <rect x="352" y="138" width="110" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="407" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Curriculum</text>
    </g>

    <g transform="translate(730 382)">
      <rect width="600" height="176" rx="18" fill="#0A1728" stroke="#00D9FF" stroke-opacity="0.42"/>
      <circle cx="62" cy="62" r="36" fill="url(#cyan)"/>
      <text x="62" y="72" text-anchor="middle" font-size="24" font-weight="950" fill="#07111F">CL</text>
      <text x="122" y="48" font-size="26" font-weight="950" fill="#FFFFFF">Cyber Labs</text>
      <text x="122" y="78" font-size="15" font-weight="800" fill="#00D9FF">Defensive security practice</text>
      <text x="122" y="114" font-size="15" font-weight="700" fill="#DFFAFF">Controlled labs for Linux operations, web auditing, scripting and secure development habits.</text>
      <rect x="122" y="138" width="88" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="166" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Kali</text>
      <rect x="222" y="138" width="92" height="24" rx="7" fill="#00D9FF" opacity="0.18"/>
      <text x="268" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Burp</text>
      <rect x="326" y="138" width="90" height="24" rx="7" fill="#FFD166" opacity="0.22"/>
      <text x="371" y="155" text-anchor="middle" font-size="12" font-weight="950" fill="#E6F7FF">Bash</text>
    </g>
  </g>

  <g fill="none" stroke="#00D9FF" stroke-width="5" stroke-linecap="round" stroke-dasharray="2 18" opacity="0.8">
    <path d="M670 254 C700 248 700 248 730 254">
      <animate attributeName="stroke-dashoffset" values="0;-40" dur="1.8s" repeatCount="indefinite"/>
    </path>
    <path d="M670 470 C700 464 700 464 730 470">
      <animate attributeName="stroke-dashoffset" values="0;-40" dur="1.8s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
