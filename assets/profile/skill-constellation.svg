      <text x="78" y="124" text-anchor="middle" font-size="18" fill="#FFFFFF">AI/Data</text>
    </g>
    <g transform="translate(632 222)">
      <circle cx="78" cy="54" r="64" fill="#00D9FF" opacity="0.24"/>
      <circle cx="78" cy="54" r="36" fill="#00D9FF"/>
