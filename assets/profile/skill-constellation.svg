    <circle cx="210" cy="420" r="1.8" opacity="0.7"/>
    <circle cx="1194" cy="144" r="2.2" opacity="0.72"/>
    <circle cx="1240" cy="468" r="1.6" opacity="0.68"/>
    <circle cx="682" cy="92" r="1.8" opacity="0.72"/>
