<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="580" viewBox="0 0 1400 580" role="img" aria-labelledby="title desc">
  <title id="title">Technology Constellation</title>
  <desc id="desc">Animated constellation of cybersecurity, web, AI, data and IoT skills.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="80%">
      <stop offset="0" stop-color="#123151"/>
      <stop offset="0.48" stop-color="#07111F"/>
      <stop offset="1" stop-color="#030712"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1400" height="580" rx="22" fill="url(#space)"/>
  <text x="70" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="950" fill="#FFFFFF">Technology Constellation</text>
  <text x="70" y="114" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="760" fill="#BDEFFF">Tools are grouped by mission: defend, build, learn, connect and measure.</text>

  <g fill="none" stroke="#00D9FF" stroke-opacity="0.28" stroke-width="2">
    <path d="M314 244 L538 168 L710 276 L928 154 L1118 248"/>
    <path d="M314 244 L492 390 L710 276 L910 410 L1118 248"/>
    <path d="M538 168 L492 390 L910 410 L928 154"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="950" filter="url(#glow)">
    <g transform="translate(236 190)">
