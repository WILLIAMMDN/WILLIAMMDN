<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="360" viewBox="0 0 1400 360" role="img" aria-labelledby="title desc">
  <title id="title">Certification Vault</title>
  <desc id="desc">Certification vault panel for Cisco, Google AI, badges and security labs.</desc>
  <rect width="1400" height="360" rx="22" fill="#F8FAFC"/>
  <rect x="1" y="1" width="1398" height="358" rx="22" fill="none" stroke="#CBD5E1"/>
  <text x="70" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="950" fill="#0B1020">Certification Vault</text>
  <text x="70" y="112" font-family="JetBrains Mono, Consolas, monospace" font-size="15" font-weight="800" fill="#64748B">Cisco badges / Google AI certificates / practical labs</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <g transform="translate(80 158)">
      <rect width="280" height="130" rx="16" fill="#0B1020"/>
      <text x="28" y="46" font-size="24" font-weight="950" fill="#22D3EE">Cisco</text>
      <text x="28" y="82" font-size="15" font-weight="700" fill="#E5E7EB">Networking Academy</text>
      <text x="28" y="106" font-size="15" font-weight="700" fill="#E5E7EB">Cybersecurity badges</text>
    </g>
    <g transform="translate(400 158)">
      <rect width="280" height="130" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="28" y="46" font-size="24" font-weight="950" fill="#4285F4">Google AI</text>
      <text x="28" y="82" font-size="15" font-weight="700" fill="#334155">AI learning certificates</text>
      <text x="28" y="106" font-size="15" font-weight="700" fill="#334155">Cloud Skills Boost</text>
    </g>
    <g transform="translate(720 158)">
      <rect width="280" height="130" rx="16" fill="#0B1020"/>
      <text x="28" y="46" font-size="24" font-weight="950" fill="#C4B5FD">Badges</text>
      <text x="28" y="82" font-size="15" font-weight="700" fill="#E5E7EB">Credential gallery</text>
      <text x="28" y="106" font-size="15" font-weight="700" fill="#E5E7EB">Verification links pending</text>
    </g>
    <g transform="translate(1040 158)">
      <rect width="280" height="130" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="28" y="46" font-size="24" font-weight="950" fill="#0B1020">Labs</text>
      <text x="28" y="82" font-size="15" font-weight="700" fill="#334155">Security practice</text>
      <text x="28" y="106" font-size="15" font-weight="700" fill="#334155">Applied project evidence</text>
    </g>
  </g>
  <path d="M80 320 H1320" stroke="#22D3EE" stroke-width="4" stroke-linecap="round" stroke-dasharray="22 18">
    <animate attributeName="stroke-dashoffset" values="0;-88" dur="2.4s" repeatCount="indefinite"/>
  </path>
</svg>
