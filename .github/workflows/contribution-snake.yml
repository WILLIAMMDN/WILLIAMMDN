name: Generate contribution snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate SVG files
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?palette=github-light&color_snake=#111827&color_dots=#ebedf0,#ccfbf1,#99f6e4,#2dd4bf,#0f766e
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#10b981&color_dots=#161b22,#0f172a,#134e4a,#0f766e,#10b981

      - name: Publish generated files
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
